<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venta de Vehículo</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --action-color: #25D366; /* Color de WhatsApp */
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
        }
        .price {
            text-align: center;
            font-size: 2em;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        /* Estilos del Carrusel */
        .carousel-container {
            position: relative;
            max-width: 100%;
            margin: auto;
            overflow: hidden;
            border-radius: 8px;
        }
        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-slides img {
            width: 100%;
            flex-shrink: 0;
            object-fit: cover;
            aspect-ratio: 16/9;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 15px;
            cursor: pointer;
            font-size: 18px;
            border-radius: 50%;
        }
        .prev { left: 10px; }
        .next { right: 10px; }

        /* Especificaciones */
        .specs {
            margin-top: 30px;
            border-collapse: collapse;
            width: 100%;
        }
        .specs th, .specs td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        .specs th {
            background-color: var(--primary-color);
            color: white;
            width: 40%;
        }

        /* Botón de Contacto */
        .contact-btn {
            display: block;
            width: 100%;
            background-color: var(--action-color);
            color: white;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 30px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Clio Renault 2006 1.6 cilindraje</h1>
    <div class="price">$70,000 MXN</div>

    <div class="carousel-container">
        <div class="carousel-slides" id="slides">
            <img src="foto1.jpeg" alt="Vista frontal">
            <img src="foto2.jpeg" alt="Vista lateral">
            <img src="foto3.jpeg" alt="Interior">
            <img src="foto4.jpeg" alt="Interior">
            <img src="foto5.jpeg" alt="Interior">
            <img src="foto6.jpeg" alt="Interior">
        </div>
        <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
    </div>

    <table class="specs">
        <tr><th>Kilometraje</th><td>138,604 km</td></tr>
        <tr><th>Transmisión</th><td> Manual</td></tr>
        <tr><th>AireAcondicionado</th><td> Si</td></tr>
        <tr><th>Motor</th><td> 4 Cilindros</td></tr>
        <tr><th>Propietarios</th><td>3er dueño</td></tr>
        <tr><th>Pagos</th><td>Todo pagado al 2026</td></tr>
    </table>

    <a href="https://wa.me/525547147157?text=Hola,%20estoy%20interesado%20en%20el%20vehículo" class="contact-btn">
        Contactar por WhatsApp
    </a>
</div>

<script>
    let currentSlide = 0;
    const slidesContainer = document.getElementById('slides');
    const totalSlides = document.querySelectorAll('.carousel-slides img').length;

    function moveSlide(direction) {
        currentSlide += direction;
        
        if (currentSlide < 0) {
            currentSlide = totalSlides - 1;
        } else if (currentSlide >= totalSlides) {
            currentSlide = 0;
        }
        
        const offset = -currentSlide * 100;
        slidesContainer.style.transform = `translateX(${offset}%)`;
    }
</script>

</body>
</html>
